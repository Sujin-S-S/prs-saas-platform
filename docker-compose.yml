version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: prs-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prs_saas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prs_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prs-api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/prs_saas?schema=public"
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: "super_secret_jwt_sign_key_prs_saas"

volumes:
  pgdata:
    driver: local
